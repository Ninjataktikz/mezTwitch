<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #05060F; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    @keyframes mezblink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes mezwarp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.85; } 100% { transform: translateY(1520px); opacity: 0; } }
  </style>
  <script>
    (function () {
      function fit() { document.documentElement.style.setProperty('--mezscale', Math.min(window.innerWidth / 1920, window.innerHeight / 1080)); }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</helmet>
<div data-screen-label="OBS BRB" style="width: 1920px; height: 1080px; flex-shrink: 0; transform: scale(var(--mezscale, 1)); background: radial-gradient(circle at 50% 50%, #10142A 0%, #05060F 78%); position: relative; font-family: ui-monospace, 'SF Mono', Consolas, monospace; color: #FAFAF8; overflow: hidden;">
  <div style="position: absolute; left: 6%; top: -220px; width: 2px; height: 130px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.8)); animation: mezwarp 2.6s linear infinite;"></div>
  <div style="position: absolute; left: 16%; top: -220px; width: 2px; height: 160px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 2.2s 0.7s linear infinite;"></div>
  <div style="position: absolute; left: 28%; top: -220px; width: 1px; height: 110px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.7)); animation: mezwarp 3s 0.3s linear infinite;"></div>
  <div style="position: absolute; left: 43%; top: -220px; width: 2px; height: 150px; background: linear-gradient(180deg, transparent, #B9C6FF); animation: mezwarp 2.4s 1.2s linear infinite;"></div>
  <div style="position: absolute; left: 58%; top: -220px; width: 1px; height: 120px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.7)); animation: mezwarp 2.8s 0.5s linear infinite;"></div>
  <div style="position: absolute; left: 72%; top: -220px; width: 2px; height: 170px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 2.3s 1.6s linear infinite;"></div>
  <div style="position: absolute; left: 84%; top: -220px; width: 2px; height: 140px; background: linear-gradient(180deg, transparent, #B9C6FF); animation: mezwarp 2.7s 0.9s linear infinite;"></div>
  <div style="position: absolute; left: 94%; top: -220px; width: 1px; height: 120px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.7)); animation: mezwarp 3.2s 1.4s linear infinite;"></div>
  <div style="position: absolute; top: 48px; left: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">mez//standby</div>
  <div style="position: absolute; top: 48px; right: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">{{ dateStr }}</div>
  <div style="position: absolute; bottom: 48px; left: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">faceit/mezcs_</div>
  <div style="position: absolute; bottom: 48px; right: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">1920×1080/60</div>
  <div style="position: absolute; top: 44px; left: 50%; transform: translateX(-50%); width: 1px; height: 24px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%); width: 1px; height: 24px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; left: 44px; top: 50%; transform: translateY(-50%); width: 24px; height: 1px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; right: 44px; top: 50%; transform: translateY(-50%); width: 24px; height: 1px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); text-align: center; white-space: nowrap;">
    <svg viewBox="0 0 390 80" width="220" role="img" aria-label="mez." style="display: block; margin: 0 auto; filter: drop-shadow(0 0 20px rgba(109,124,255,0.5));">
      <g fill="#FAFAF8"><rect width="112" height="18"></rect><rect width="20" height="80"></rect><rect x="46" width="20" height="80"></rect><rect x="92" width="20" height="80"></rect><g transform="translate(128,0)"><rect width="76" height="18"></rect><rect width="20" height="80"></rect><rect y="31" width="76" height="18"></rect><rect x="56" y="18" width="20" height="13"></rect><rect y="62" width="76" height="18"></rect></g><g transform="translate(220,0)"><rect width="68" height="18"></rect><polygon points="44,18 68,18 24,62 0,62"></polygon><rect y="62" width="128" height="18"></rect></g></g>
      <rect x="368" y="58" width="22" height="22" fill="#6D7CFF"></rect>
    </svg>
    <div style="font-size: 26px; letter-spacing: 0.14em; text-transform: uppercase; color: #9FA8CC; margin-top: 72px; line-height: 2;">standby<br>{{ message }}<br><span style="color: {{ statColor }};">elo {{ elo }}</span><span style="color: #FAFAF8;"> · </span><span style="color: {{ kdColor }};">k/d {{ kd }}</span><span style="color: #FAFAF8;"> · </span><span style="color: {{ hsColor }};">hs {{ hs }}%</span> <span style="display: inline-block; width: 14px; height: 14px; background: #6D7CFF; animation: mezblink 2s step-end infinite;"></span></div>
    <sc-if value="{{ hasRank }}" hint-placeholder-val="{{ false }}">
      <div style="font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 14px;"><span style="color: #17A30A;">{{ rankRegion }}</span><span style="color: {{ statColor }};">{{ rankNum }}</span><span style="color: #8A93B8;">{{ rankTotal }}</span></div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },
  &quot;message&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;back in a moment — chat stays open&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;faceitNickname&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;mezcs_&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;faceitApiKey&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2a621cc6-c23e-4e00-bf76-2284c7d06489&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;elo&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2847&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;kd&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;1.01&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;hs&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;51&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; }
}">
class Component extends DCLogic {
  state = {};

  componentDidMount() {
    this._startFaceit();
  }

  componentWillUnmount() {
    clearInterval(this._faceitTimer);
  }

  _startFaceit() {
    const key = (this.props.faceitApiKey ?? '').trim();
    const nick = (this.props.faceitNickname ?? 'mezcs_').trim();
    if (!key || !nick) return;
    const poll = () => {
      import('./faceit.js')
        .then((m) => m.fetchFaceitLive(nick, key).then((s) => this.setState({ live: s, statColor: m.levelColor(s.level), kdColor: m.kdColor(s.kd), hsColor: m.hsColor(s.hs) })))
        .catch(() => {});
    };
    poll();
    this._faceitTimer = setInterval(poll, 300000);
  }

  renderVals() {
    const st = this.state || {};
    const live = st.live || {};
    const now = new Date();
    return {
      dateStr: now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0'),
      message: this.props.message ?? 'back in a moment — chat stays open',
      elo: live.elo ?? this.props.elo ?? '2847',
      kd: live.kd ?? this.props.kd ?? '1.01',
      hs: live.hs ?? this.props.hs ?? '51',
      hasRank: live.rank != null,
      rankRegion: live.rank != null ? (live.region ?? 'na') : '',
      rankNum: live.rank != null ? ' #' + live.rank : '',
      rankTotal: live.rank != null && live.total ? ' / ' + live.total.toLocaleString() : '',
      statColor: st.statColor ?? '#B9C6FF',
      kdColor: st.kdColor ?? '#9FA8CC',
      hsColor: st.hsColor ?? '#9FA8CC',
    };
  }
}
</script>
</body>
</html>
