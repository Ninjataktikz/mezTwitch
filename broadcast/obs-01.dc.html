<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #05060F; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    @keyframes mezping { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(3.2); opacity: 0; } }
    @keyframes mezbreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }
    @keyframes mezwarp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.85; } 100% { transform: translateY(1520px); opacity: 0; } }
    @keyframes mezpulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
  <script>
    (function () {
      function fit() { document.documentElement.style.setProperty('--mezscale', Math.min(window.innerWidth / 1920, window.innerHeight / 1080)); }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</helmet>
<div data-screen-label="OBS Starting Soon" style="width: 1920px; height: 1080px; flex-shrink: 0; transform: scale(var(--mezscale, 1)); background: radial-gradient(circle at 50% 50%, #10142A 0%, #05060F 78%); position: relative; font-family: ui-monospace, 'SF Mono', Consolas, monospace; color: #FAFAF8; overflow: hidden;">
  <div style="position: absolute; left: 4%; top: -220px; width: 2px; height: 150px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 1.6s linear infinite;"></div>
  <div style="position: absolute; left: 11%; top: -220px; width: 3px; height: 190px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 1.3s 0.5s linear infinite;"></div>
  <div style="position: absolute; left: 18%; top: -220px; width: 2px; height: 120px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 1.9s 0.2s linear infinite;"></div>
  <div style="position: absolute; left: 26%; top: -220px; width: 2px; height: 170px; background: linear-gradient(180deg, transparent, #B9C6FF); animation: mezwarp 1.4s 0.8s linear infinite;"></div>
  <div style="position: absolute; left: 33%; top: -220px; width: 1px; height: 130px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 1.7s 0.4s linear infinite;"></div>
  <div style="position: absolute; left: 41%; top: -220px; width: 2px; height: 150px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 1.2s 1s linear infinite;"></div>
  <div style="position: absolute; left: 52%; top: -220px; width: 1px; height: 110px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 2s 0.6s linear infinite;"></div>
  <div style="position: absolute; left: 60%; top: -220px; width: 2px; height: 180px; background: linear-gradient(180deg, transparent, #B9C6FF); animation: mezwarp 1.35s 0.15s linear infinite;"></div>
  <div style="position: absolute; left: 68%; top: -220px; width: 3px; height: 200px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 1.25s 0.7s linear infinite;"></div>
  <div style="position: absolute; left: 76%; top: -220px; width: 1px; height: 120px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 1.8s 0.3s linear infinite;"></div>
  <div style="position: absolute; left: 84%; top: -220px; width: 2px; height: 160px; background: linear-gradient(180deg, transparent, #FFFFFF); animation: mezwarp 1.55s 0.9s linear infinite;"></div>
  <div style="position: absolute; left: 92%; top: -220px; width: 2px; height: 140px; background: linear-gradient(180deg, transparent, #8FA8FF); animation: mezwarp 1.45s 1.1s linear infinite;"></div>
  <div style="position: absolute; top: 48px; left: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">mez//broadcast</div>
  <div style="position: absolute; top: 48px; right: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">{{ dateStr }}</div>
  <div style="position: absolute; bottom: 48px; left: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">faceit/mezcs_</div>
  <div style="position: absolute; bottom: 48px; right: 48px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">1920×1080/60</div>
  <div style="position: absolute; top: 44px; left: 50%; transform: translateX(-50%); width: 1px; height: 24px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%); width: 1px; height: 24px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; left: 44px; top: 50%; transform: translateY(-50%); width: 24px; height: 1px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; right: 44px; top: 50%; transform: translateY(-50%); width: 24px; height: 1px; background: rgba(143,168,255,0.22);"></div>
  <div style="position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%); text-align: center; white-space: nowrap;">
    <div style="position: relative; width: 360px; margin: 0 auto; animation: mezpulse 3.5s ease-in-out infinite;">
      <svg viewBox="0 0 390 80" width="360" role="img" aria-label="mez." style="display: block; filter: drop-shadow(0 0 24px rgba(109,124,255,0.55));">
        <g fill="#FAFAF8"><rect width="112" height="18"></rect><rect width="20" height="80"></rect><rect x="46" width="20" height="80"></rect><rect x="92" width="20" height="80"></rect><g transform="translate(128,0)"><rect width="76" height="18"></rect><rect width="20" height="80"></rect><rect y="31" width="76" height="18"></rect><rect x="56" y="18" width="20" height="13"></rect><rect y="62" width="76" height="18"></rect></g><g transform="translate(220,0)"><rect width="68" height="18"></rect><polygon points="44,18 68,18 24,62 0,62"></polygon><rect y="62" width="128" height="18"></rect></g></g>
      </svg>
      <div style="position: absolute; left: 339px; top: 53px; width: 21px; height: 21px; background: #6D7CFF; box-shadow: 0 0 18px rgba(109,124,255,0.8); animation: mezbreathe 2.4s ease-in-out infinite;"></div>
      <div style="position: absolute; left: 339px; top: 53px; width: 21px; height: 21px; border: 1px solid #6D7CFF; animation: mezping 2.4s ease-out infinite;"></div>
    </div>
    <div style="font-size: 26px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 72px;"><span style="color: {{ statColor }};">elo {{ elo }}</span><span style="color: #8A93B8;"> · </span><span style="color: {{ kdColor }};">k/d {{ kd }}</span><span style="color: #8A93B8;"> · </span><span style="color: {{ hsColor }};">hs {{ hs }}%</span></div>
    <sc-if value="{{ hasRank }}" hint-placeholder-val="{{ false }}">
      <div style="font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 18px;"><span style="color: #17A30A;">{{ rankRegion }}</span><span style="color: {{ statColor }};">{{ rankNum }}</span><span style="color: {{ muted }};">{{ rankTotal }}</span></div>
    </sc-if>
  </div>
  <div style="position: absolute; left: 50%; bottom: 130px; transform: translateX(-50%); font-size: 34px; letter-spacing: 0.3em; text-transform: uppercase; color: #B9C6FF; white-space: nowrap;">{{ dotsText }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },
  &quot;faceitNickname&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;mezcs_&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;faceitApiKey&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2a621cc6-c23e-4e00-bf76-2284c7d06489&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;elo&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2847&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;kd&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;1.01&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;hs&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;51&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; }
}">
class Component extends DCLogic {
  state = {};

  componentDidMount() {
    this._startFaceit();
    this._dotsTimer = setInterval(() => this.setState((s) => ({ d: ((s.d ?? 0) + 1) % 4 })), 800);
  }

  componentWillUnmount() {
    clearInterval(this._faceitTimer);
    clearInterval(this._dotsTimer);
  }

  _startFaceit() {
    const key = (this.props.faceitApiKey ?? '').trim();
    const nick = (this.props.faceitNickname ?? 'mezcs_').trim();
    if (!key || !nick) return;
    const poll = () => {
      import('./faceit.js')
        .then((m) => m.fetchFaceitLive(nick, key).then((s) => this.setState({ live: s, statColor: m.levelColor(s.level), kdColor: m.kdColor(s.kd), hsColor: m.hsColor(s.hs) })))
        .catch(() => {});
    };
    poll();
    this._faceitTimer = setInterval(poll, 300000);
  }

  renderVals() {
    const st = this.state || {};
    const live = st.live || {};
    const now = new Date();
    return {
      dateStr: now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0'),
      dotsText: 'starting soon' + '...'.slice(0, st.d ?? 0),
      elo: live.elo ?? this.props.elo ?? '2847',
      kd: live.kd ?? this.props.kd ?? '1.01',
      hs: live.hs ?? this.props.hs ?? '51',
      hasRank: live.rank != null,
      rankRegion: live.rank != null ? (live.region ?? 'na') : '',
      rankNum: live.rank != null ? ' #' + live.rank : '',
      rankTotal: live.rank != null && live.total ? ' / ' + live.total.toLocaleString() : '',
      statColor: st.statColor ?? '#9FA8CC',
      kdColor: st.kdColor ?? '#9FA8CC',
      hsColor: st.hsColor ?? '#9FA8CC',
      muted: '#8A93B8',
    };
  }
}
</script>
</body>
</html>
