<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #05060F; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    @keyframes mezblink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes mezwarp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.7; } 100% { transform: translateY(1520px); opacity: 0; } }
  </style>
  <script>
    (function () {
      function fit() { document.documentElement.style.setProperty('--mezscale', Math.min(window.innerWidth / 1920, window.innerHeight / 1080)); }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</helmet>
<div data-screen-label="OBS Review" style="width: 1920px; height: 1080px; flex-shrink: 0; transform: scale(var(--mezscale, 1)); background: radial-gradient(circle at 50% 50%, #10142A 0%, #05060F 78%); position: relative; font-family: ui-monospace, 'SF Mono', Consolas, monospace; color: #FAFAF8; overflow: hidden;">
  <div style="position: absolute; left: 12%; top: -220px; width: 1px; height: 110px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.55)); animation: mezwarp 2.8s linear infinite;"></div>
  <div style="position: absolute; left: 40%; top: -220px; width: 2px; height: 130px; background: linear-gradient(180deg, transparent, rgba(143,168,255,0.6)); animation: mezwarp 2.4s 0.8s linear infinite;"></div>
  <div style="position: absolute; left: 55%; top: -220px; width: 1px; height: 100px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.5)); animation: mezwarp 3s 1.4s linear infinite;"></div>
  <div style="position: absolute; left: 71%; top: -220px; width: 2px; height: 140px; background: linear-gradient(180deg, transparent, rgba(185,198,255,0.6)); animation: mezwarp 2.6s 0.4s linear infinite;"></div>
  <div style="position: absolute; left: 88%; top: -220px; width: 1px; height: 115px; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.5)); animation: mezwarp 2.9s 1.9s linear infinite;"></div>
  <div style="position: absolute; left: 96%; top: -220px; width: 2px; height: 125px; background: linear-gradient(180deg, transparent, rgba(143,168,255,0.55)); animation: mezwarp 2.5s 1.1s linear infinite;"></div>

  <div style="position: absolute; top: 40px; left: 96px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">mez//review</div>
  <div style="position: absolute; top: 40px; right: 96px; font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">{{ dateStr }}</div>

  <!-- 03-capture · window capture zone 1216×684 -->
  <div style="position: absolute; left: 96px; top: 96px; width: 1216px; height: 684px; border: 1px solid rgba(143,168,255,0.28); box-sizing: border-box;">
    <sc-if value="{{ demo }}" hint-placeholder-val="{{ true }}">
      <div style="width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #151A32 0, #151A32 24px, #191F3A 24px, #191F3A 48px); display: flex; align-items: center; justify-content: center;">
        <div style="font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F79A0;">demo playback 1216×684 (window capture on top)</div>
      </div>
    </sc-if>
  </div>

  <!-- 03-cam · webcam right of the capture -->
  <div style="position: absolute; left: 1360px; top: 96px; width: 464px; height: 261px;">
    <sc-if value="{{ demo }}" hint-placeholder-val="{{ true }}">
      <div style="width: 100%; height: 100%; border: 1px solid rgba(143,168,255,0.28); box-sizing: border-box; background: repeating-linear-gradient(45deg, #151A32 0, #151A32 16px, #191F3A 16px, #191F3A 32px); display: flex; align-items: center; justify-content: center;">
        <div style="font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase; color: #6F79A0;">webcam 464×261</div>
      </div>
    </sc-if>
    <sc-if value="{{ liveMode }}" hint-placeholder-val="{{ false }}">
      <div style="width: 100%; height: 100%; border: 1px solid rgba(143,168,255,0.28); box-sizing: border-box;"></div>
    </sc-if>
  </div>

  <!-- 03-notes · round notes under the webcam -->
  <div style="position: absolute; left: 1360px; top: 389px; width: 464px;">
    <div style="font-size: 18px; letter-spacing: 0.14em; text-transform: uppercase; color: #6D7CFF; margin-bottom: 20px; display: flex; align-items: center; gap: 14px;">
      <div style="width: 14px; height: 14px; background: #6D7CFF; animation: mezblink 2s step-end infinite;"></div>
      <div>now reviewing</div>
    </div>
    <div style="font-size: 24px; line-height: 1.9; color: #9FA8CC; border-top: 1px solid rgba(143,168,255,0.28); padding-top: 20px;">
      {{ noteMap }}
    </div>
  </div>

  <!-- 03-title · title block bottom-left -->
  <div style="position: absolute; left: 96px; bottom: 96px;">
    <div style="font-size: 52px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1;">{{ title }}</div>
  </div>

  <!-- logo + numbers bottom-right -->
  <div style="position: absolute; right: 96px; bottom: 96px; display: flex; flex-direction: column; align-items: flex-end; gap: 24px;">
    <svg viewBox="0 0 390 80" width="132" role="img" aria-label="mez.">
      <g fill="#FAFAF8"><rect width="112" height="18"></rect><rect width="20" height="80"></rect><rect x="46" width="20" height="80"></rect><rect x="92" width="20" height="80"></rect><g transform="translate(128,0)"><rect width="76" height="18"></rect><rect width="20" height="80"></rect><rect y="31" width="76" height="18"></rect><rect x="56" y="18" width="20" height="13"></rect><rect y="62" width="76" height="18"></rect></g><g transform="translate(220,0)"><rect width="68" height="18"></rect><polygon points="44,18 68,18 24,62 0,62"></polygon><rect y="62" width="128" height="18"></rect></g></g>
      <rect x="368" y="58" width="22" height="22" fill="#6D7CFF"></rect>
    </svg>
    <div style="font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase; color: #FAFAF8; text-align: right; font-variant-numeric: tabular-nums;"><span style="color: {{ statColor }};">elo {{ elo }}</span> · <span style="color: {{ kdColor }};">k/d {{ kd }}</span> · <span style="color: {{ hsColor }};">hs {{ hs }}%</span></div>
    <sc-if value="{{ hasRank }}" hint-placeholder-val="{{ false }}">
      <div style="font-size: 18px; letter-spacing: 0.14em; text-transform: uppercase; text-align: right;"><span style="color: #17A30A;">{{ rankRegion }}</span><span style="color: {{ statColor }};">{{ rankNum }}</span><span style="color: #8A93B8;">{{ rankTotal }}</span></div>
    </sc-if>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },
  &quot;demo&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;obs&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;the review.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;copy&quot; },
  &quot;faceitNickname&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;mezcs_&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;faceitApiKey&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2a621cc6-c23e-4e00-bf76-2284c7d06489&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;elo&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2847&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;kd&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;1.01&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; },
  &quot;hs&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;51&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;live numbers (fallback)&quot; }
}">
class Component extends DCLogic {
  state = {};

  componentDidMount() {
    this._startFaceit();
  }

  componentWillUnmount() {
    clearInterval(this._faceitTimer);
  }

  _startFaceit() {
    const key = (this.props.faceitApiKey ?? '').trim();
    const nick = (this.props.faceitNickname ?? 'mezcs_').trim();
    if (!key || !nick) return;
    const poll = () => {
      import('./faceit.js')
        .then((m) => m.fetchFaceitLive(nick, key).then((s) => this.setState({ live: s, statColor: m.levelColor(s.level), kdColor: m.kdColor(s.kd), hsColor: m.hsColor(s.hs) })))
        .catch(() => {});
    };
    poll();
    this._faceitTimer = setInterval(poll, 300000);
  }

  renderVals() {
    const st = this.state || {};
    const live = st.live || {};
    const liveNote = live.last ? '> ' + live.last.map + ' — ' + live.last.score + ' ' + (live.last.win ? 'w' : 'l') : undefined;
    const liveUrl = new URLSearchParams(window.location.search).get('live') === '1';
    const demo = this.props.demo ?? !liveUrl;
    const now = new Date();
    return {
      demo: demo,
      liveMode: !demo,
      dateStr: now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0'),
      title: this.props.title ?? 'the review.',
      noteMap: liveNote ?? '> syncing last match',
      elo: live.elo ?? this.props.elo ?? '2847',
      kd: live.kd ?? this.props.kd ?? '1.01',
      hs: live.hs ?? this.props.hs ?? '51',
      hasRank: live.rank != null,
      rankRegion: live.rank != null ? (live.region ?? 'na') : '',
      rankNum: live.rank != null ? ' #' + live.rank : '',
      rankTotal: live.rank != null && live.total ? ' / ' + live.total.toLocaleString() : '',
      statColor: st.statColor ?? '#9FA8CC',
      kdColor: st.kdColor ?? '#9FA8CC',
      hsColor: st.hsColor ?? '#9FA8CC',
    };
  }
}
</script>
</body>
</html>
