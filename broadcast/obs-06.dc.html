<x-dc>
<helmet>

    <div style="display: flex; align-items: center; gap: 24px; margin-top: 40px;">
      <div style="width: 22px; height: 22px; background: #6D7CFF; animation: mezblink 2s step-end infinite;"></div>
      <div style="font-family: ui-monospace, 'SF Mono', Consolas, monospace; font-size: 26px; letter-spacing: 0.14em; text-transform: uppercase; color: #B9B9B4;">technical reset — right back</div>
    </div>
  </div>

      <rect x="368" y="58" width="22" height="22" fill="#6D7CFF"></rect>
    </svg>
  </div>
</div>
</x-dc>
</body>
</html>
