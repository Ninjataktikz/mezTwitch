<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    @keyframes mezping { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(3.2); opacity: 0; } }
    @keyframes mezbreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }
  </style>
  <script>
    (function () {
      function fit() { document.documentElement.style.setProperty('--mezscale', Math.min(window.innerWidth / 1920, window.innerHeight / 1080)); }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</helmet>
<div data-screen-label="OBS Game Overlay" style="width: 1920px; height: 1080px; flex-shrink: 0; transform: scale(var(--mezscale, 1)); position: relative; font-family: ui-monospace, 'SF Mono', Consolas, monospace; overflow: hidden; background: transparent;">

  <!-- the one and only element: mez live card, top-left -->
  <div style="position: absolute; top: 24px; left: 24px; width: 384px; height: 216px; box-sizing: border-box; border: 1px solid #2A2A28; background: rgba(14,14,14,0.92); display: flex; flex-direction: column; justify-content: space-between; padding: 14px 18px;">
    <div style="display: flex; justify-content: space-between; font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; color: #6E6E68;"><span>mez//live</span><span style="color: #6D7CFF;">■ rec</span></div>
    <div style="position: relative; width: 160px; margin: 0 auto;">
      <svg viewBox="0 0 390 80" width="160" role="img" aria-label="mez." style="display: block;">
        <g fill="#FAFAF8"><rect width="112" height="18"></rect><rect width="20" height="80"></rect><rect x="46" width="20" height="80"></rect><rect x="92" width="20" height="80"></rect><g transform="translate(128,0)"><rect width="76" height="18"></rect><rect width="20" height="80"></rect><rect y="31" width="76" height="18"></rect><rect x="56" y="18" width="20" height="13"></rect><rect y="62" width="76" height="18"></rect></g><g transform="translate(220,0)"><rect width="68" height="18"></rect><polygon points="44,18 68,18 24,62 0,62"></polygon><rect y="62" width="128" height="18"></rect></g></g>
      </svg>
      <div style="position: absolute; left: 151px; top: 24px; width: 9px; height: 9px; background: #6D7CFF; animation: mezbreathe 2.4s ease-in-out infinite;"></div>
      <div style="position: absolute; left: 151px; top: 24px; width: 9px; height: 9px; border: 1px solid #6D7CFF; animation: mezping 2.4s ease-out infinite;"></div>
    </div>
    <div>
      <div style="font-size: 28px; color: {{ statColor }}; font-variant-numeric: tabular-nums; line-height: 1.2;">elo {{ elo }}<span style="color: #6D7CFF;">{{ deltaStr }}</span></div>
      <div style="font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; font-variant-numeric: tabular-nums;"><span style="color: #17A30A;">{{ rankRegion }}</span><span style="color: {{ statColor }};">{{ rankNum }}</span><span style="color: #6E6E68;">{{ rankTotal }}</span></div>
      <div style="font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; font-variant-numeric: tabular-nums;"><span style="color: #B9B9B4;">{{ wlPrefix }}</span><span style="color: #17A30A;">{{ wPart }}</span><span style="color: #6E6E68;">{{ wlSep }}</span><span style="color: #FE1F00;">{{ lPart }}</span></div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },
  &quot;faceitNickname&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;mezcs_&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;faceitApiKey&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2a621cc6-c23e-4e00-bf76-2284c7d06489&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;faceit auto&quot; },
  &quot;elo&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2847&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;fallback&quot; }
}">
class Component extends DCLogic {
  state = {};

  componentDidMount() {
    this._startFaceit();
  }

  componentWillUnmount() {
    clearInterval(this._faceitTimer);
  }

  _startFaceit() {
    const key = (this.props.faceitApiKey ?? '2a621cc6-c23e-4e00-bf76-2284c7d06489').trim();
    const nick = (this.props.faceitNickname ?? 'mezcs_').trim();
    if (!key || !nick) return;
    const poll = () => {
      import('./faceit.js')
        .then((m) => m.fetchFaceitLive(nick, key).then((s) => this.setState({ live: s, delta: m.sessionDelta(s.elo), statColor: m.levelColor(s.level) })))
        .catch(() => {});
    };
    poll();
    this._faceitTimer = setInterval(poll, 300000);
  }

  renderVals() {
    const st = this.state || {};
    const live = st.live || {};
    return {
      elo: live.elo ?? this.props.elo ?? '2847',
      statColor: st.statColor ?? '#FAFAF8',
      deltaStr: st.delta != null ? ' ' + (st.delta >= 0 ? '+' + st.delta : String(st.delta)) : '',
      rankRegion: live.rank != null ? (live.region ?? 'na') : '',
      rankNum: live.rank != null ? ' #' + live.rank : '',
      rankTotal: live.rank != null && live.total ? ' / ' + live.total.toLocaleString() : '',
      wlPrefix: live.todayW != null ? 'today ' : 'faceit elo',
      wPart: live.todayW != null ? 'W' + live.todayW : '',
      wlSep: live.todayW != null ? ' - ' : '',
      lPart: live.todayW != null ? 'L' + (live.todayL ?? 0) : '',
    };
  }
}
</script>
</body>
</html>
