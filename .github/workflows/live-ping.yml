name: live ping
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 min
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: check twitch, ping discord on go-live
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          node -e '
          const fs = require("fs");
          (async () => {
            const tr = await fetch("https://id.twitch.tv/oauth2/token", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: "client_id=" + process.env.TWITCH_CLIENT_ID + "&client_secret=" + process.env.TWITCH_CLIENT_SECRET + "&grant_type=client_credentials",
            });
            if (!tr.ok) { console.log("token failed:", tr.status); process.exit(0); }
            const tok = await tr.json();
            const sr = await fetch("https://api.twitch.tv/helix/streams?user_login=mezcs_", {
              headers: { "Client-Id": process.env.TWITCH_CLIENT_ID, Authorization: "Bearer " + tok.access_token },
            });
            if (!sr.ok) { console.log("streams failed:", sr.status); process.exit(0); }
            const s = await sr.json();
            const live = !!(s.data && s.data.length);
            const path = "data/live.json";
            const prev = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, "utf8")) : { live: false };
            if (live === !!prev.live) { console.log("no change, live =", live); process.exit(0); }
            if (live && process.env.DISCORD_WEBHOOK) {
              const title = (s.data[0].title || "faceit — the grind").toLowerCase();
              await fetch(process.env.DISCORD_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: "live — " + title + "\ntwitch.tv/mezcs_" }),
              });
              console.log("pinged discord");
            }
            fs.writeFileSync(path, JSON.stringify({ live: live }));
          })();
          '
      - name: commit
        run: |
          git config user.name "ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet || (git commit -m "live state change" && git push)
